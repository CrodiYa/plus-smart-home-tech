spring.output.ansi.enabled=ALWAYS

grpc.server.port=59090
grpc.client.hub-router.address=static://localhost:59090
grpc.client.hub-router.negotiationType=plaintext
grpc.client.hub-router.enableKeepAlive=true
grpc.client.hub-router.keepAliveWithoutCalls=true

sht.telemetry.snapshots.topic=telemetry.snapshots.v1
sht.telemetry.hubs.topic=telemetry.hubs.v1
sht.bootstrap=localhost:9092
sht.consumeAttemptTimeout=100

spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://0.0.0.0:5432/smarthome
spring.datasource.username=smarthome
spring.datasource.password=smarthome

spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql